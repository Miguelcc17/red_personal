version: '3.8'
services:
  neo4j:
    image: neo4j
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - .env
    volumes:
      - neo4j_data:/data
    networks:
      - neo4j-network

volumes:
  neo4j_data:

networks:
  neo4j-network:
    driver: bridge