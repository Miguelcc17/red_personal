services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - neo4j_data:/data
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: people-network-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: people-network-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  neo4j_data:

networks:
  app-network:
    driver: bridge
